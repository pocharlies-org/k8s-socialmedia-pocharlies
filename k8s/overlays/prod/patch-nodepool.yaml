# Node placement split (2026-06-02):
#
# Move only IP-AGNOSTIC workloads off the `ubuntu` node onto the ks5 NVMe pool, so ubuntu
# can shrink toward a residential-only worker.
#
# DELIBERATELY NOT MOVED (stay on ubuntu's residential IP):
#  - whatsapp-connector{,-professional}: Baileys/WhatsApp Web — WhatsApp flags datacenter IPs.
#  - telegram-connector{,-professional} + telegram-sync{,-professional}: gramjs/telethon
#    sessions are IP-EXCLUSIVE. Moving them triggered telethon AuthKeyDuplicatedError (session
#    used from two IPs during the rollout) + tsx watch-mode hit ks5's low fs.inotify limit
#    (EMFILE). Telegram messaging sessions must stay pinned to one stable IP, like WhatsApp.
#  Left on their existing nodeSelector topology=lan (= ubuntu today), untouched so this change
#  does not recreate them / churn their live sessions.
#
# MOVED to node-pool=ks5-nvme (no IP-bound session): instagram-connector (Graph API tokens),
# mcp-server, mcp-sse, brain-ingest, and the nats/minio/redis backends. nats/minio carry RWO
# Longhorn PVCs but use strategy: Recreate, so the cross-node move is safe. topology:null
# deletes the inherited topology=lan key; mcp-sse also drops its explicit hostname=ubuntu pin.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-mcp-redis
  namespace: whatsapp-mcp
spec:
  template:
    spec:
      nodeSelector:
        topology: null
        node-pool: ks5-nvme
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-mcp-nats
  namespace: whatsapp-mcp
spec:
  template:
    spec:
      nodeSelector:
        topology: null
        node-pool: ks5-nvme
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-mcp-minio
  namespace: whatsapp-mcp
spec:
  template:
    spec:
      nodeSelector:
        topology: null
        node-pool: ks5-nvme
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: instagram-connector
  namespace: whatsapp-mcp
spec:
  template:
    spec:
      nodeSelector:
        topology: null
        node-pool: ks5-nvme
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: whatsapp-mcp
spec:
  template:
    spec:
      nodeSelector:
        topology: null
        node-pool: ks5-nvme
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-sse
  namespace: whatsapp-mcp
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: null
        node-pool: ks5-nvme
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: brain-ingest
  namespace: whatsapp-mcp
spec:
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            topology: null
            node-pool: ks5-nvme
