# Node placement split (2026-06-01):
#
# Move everything that is NOT IP-sensitive off the `ubuntu` node onto the ks5 NVMe pool,
# so `ubuntu` can eventually be demoted to a small residential-only worker.
#
# DELIBERATELY NOT TOUCHED: whatsapp-connector and whatsapp-connector-professional.
# They use Baileys (WhatsApp Web linked device); WhatsApp bans/flags datacenter IPs, so
# they MUST keep egressing via the home/residential IP (the `ubuntu` node). They stay on
# their existing nodeSelector topology=lan (which today resolves only to `ubuntu`) — left
# untouched on purpose so this change does NOT recreate their pods and reconnect the live
# WhatsApp sessions. CAVEAT: before relabeling/demoting `ubuntu`, either keep the
# topology=lan label on ubuntu or re-pin these two to kubernetes.io/hostname=ubuntu in a
# planned window (a pod recreate triggers a Baileys reconnect; session persists in PVC).
#
# The movers below: Telegram/Instagram connectors + syncs, mcp-server/sse, brain-ingest,
# and the nats/minio/redis backends. nats/minio carry RWO Longhorn PVCs but already use
# strategy: Recreate, so the cross-node move is safe. topology: null deletes the inherited
# topology=lan key via strategic-merge; mcp-sse drops its explicit hostname=ubuntu pin.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-mcp-redis
  namespace: whatsapp-mcp
spec:
  template:
    spec:
      nodeSelector:
        topology: null
        node-pool: ks5-nvme
---
