apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-connector-professional
  namespace: whatsapp-mcp
spec:
  template:
    spec:
      containers:
        - name: whatsapp-connector-professional
          env:
            - name: ENABLE_SENDING
              value: "false"
            - name: EMERGENCY_DISABLE_SENDING
              value: "true"
