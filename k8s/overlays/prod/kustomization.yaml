# Enabled 2026-06-03 (v1.3.37): telegram-sync is SESSION-LESS — it ingests via the
# connector (NATS telegram.MessageReceived filtered by the per-account `account`
# field + connector HTTP API for history/media/avatars/transcription), so it holds
# NO Telethon session and the old AuthKeyDuplicated crashloop is structurally gone.
# Verified before enabling: connector v1.3.37 emits `account`; new rows dedup
# against live `tg_<marked>_<id>` rows. Both at replicas:1 (= base default; block
# kept as documentation of the cutover).
