apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: whatsapp-mcp-default-deny-ingress
  namespace: whatsapp-mcp
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: whatsapp-mcp-allow-same-namespace
  namespace: whatsapp-mcp
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: whatsapp-mcp-allow-traefik-http
  namespace: whatsapp-mcp
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - whatsapp-connector
          - whatsapp-connector-professional
          - mcp-sse
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik-lan
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik-edge
        - ipBlock:
            cidr: 100.64.0.0/10
        - ipBlock:
            cidr: 10.42.0.0/16
      ports:
        - protocol: TCP
          port: 3001
        - protocol: TCP
          port: 3010
  policyTypes:
    - Ingress
