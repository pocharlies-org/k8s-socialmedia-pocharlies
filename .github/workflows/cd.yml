name: CD

# Triggered on merge to main when source files change.
# Builds all 7 images, pushes to harbor.e-dani.com/homelab with :sha-<SHA> + :latest,
# then commits updated tags back to k8s/manifest.yaml → ArgoCD auto-syncs.
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   HARBOR_URL      = harbor.e-dani.com
#   HARBOR_USER     = robot$k8s-ci
#   HARBOR_PASSWORD = <robot account token>

on:
  push:
    branches: [main]
    paths:
      - 'connectors/**'
      - 'workers/**'
      - 'mcp-server/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ secrets.HARBOR_URL || 'harbor.e-dani.com' }}
  PROJECT: homelab
  SHA_TAG: sha-${{ github.sha }}

jobs:
  # ── Build & Push ──────────────────────────────────────────────────────────
  build-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: whatsappmcp-whatsapp-connector
            dockerfile: connectors/whatsapp-web/Dockerfile
          - service: whatsappmcp-whatsapp-cloud-connector
            dockerfile: connectors/whatsapp-cloud/Dockerfile
          - service: whatsappmcp-telegram-connector
            dockerfile: connectors/telegram/Dockerfile
          - service: whatsappmcp-telegram-sync
            dockerfile: connectors/telegram-sync/Dockerfile
          - service: whatsappmcp-instagram-connector
            dockerfile: connectors/instagram/Dockerfile
          - service: whatsappmcp-mcp-server
            dockerfile: mcp-server/Dockerfile
          - service: whatsappmcp-auto-reply-worker
            dockerfile: workers/auto-reply-worker/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ matrix.service }}:${{ env.SHA_TAG }}
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          labels: |
            org.opencontainers.image.source=https://github.com/pocharlies/k8s-socialmedia-pocharlies
            org.opencontainers.image.revision=${{ github.sha }}

  # ── Update k8s manifest with new SHA tags ─────────────────────────────────
  update-manifest:
    name: Update k8s manifest tags
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp SHA tags in k8s/manifest.yaml
        run: |
          SHA="${{ env.SHA_TAG }}"
          REG="${{ env.REGISTRY }}/${{ env.PROJECT }}"
          M="k8s/manifest.yaml"

          for SVC in \
            whatsappmcp-whatsapp-connector \
            whatsappmcp-whatsapp-cloud-connector \
            whatsappmcp-telegram-connector \
            whatsappmcp-telegram-sync \
            whatsappmcp-instagram-connector \
            whatsappmcp-mcp-server \
            whatsappmcp-auto-reply-worker; do
            sed -i "s|image: $REG/${SVC}:.*|image: $REG/${SVC}:${SHA}|g" "$M"
          done

          echo "Updated images:"
          grep "image: $REG" "$M"

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/manifest.yaml
          if git diff --staged --quiet; then
            echo "No manifest changes"
          else
            git commit -m "ci: stamp image tags → ${{ env.SHA_TAG }}"
            git push
          fi
