name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]
    tags-ignore: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  s3-tests:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: arc-k8s
    env:
      RUN_S3_INTEGRATION: "1"
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_BUCKET: skirmshop-drive-it
      S3_REGION: us-east-1
      S3_PREFIX: socialmedia
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    steps:
      - uses: actions/checkout@v4
      - name: Start MinIO
        run: |
          curl -fsSL https://dl.min.io/server/minio/release/linux-amd64/minio -o /tmp/minio
          chmod +x /tmp/minio
          mkdir -p /tmp/minio-data
          MINIO_ROOT_USER=minioadmin MINIO_ROOT_PASSWORD=minioadmin /tmp/minio server /tmp/minio-data --address :9000 >/tmp/minio.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9000/minio/health/ready >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/minio.log
          exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-setuptools
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mcp-socialmedia/server test -- --runInBand

  standard:
    needs: [s3-tests]
    if: ${{ !contains(github.event.head_commit.message || '', '[skip ci]') }}
    uses: pocharlies-org/k8s-gitops-pocharlies/.github/workflows/reusable-ci.yml@main
    with:
      runner: arc-k8s
      docker_build_timeout: 12m
      kustomize_paths: k8s/overlays/stg k8s/overlays/prod
      images: |
        [
          {"name":"whatsappmcp-whatsapp-connector","context":".","dockerfile":"connectors/whatsapp-web/Dockerfile"},
          {"name":"whatsappmcp-whatsapp-cloud-connector","context":".","dockerfile":"connectors/whatsapp-cloud/Dockerfile"},
          {"name":"whatsappmcp-telegram-connector","context":".","dockerfile":"connectors/telegram/Dockerfile"},
          {"name":"whatsappmcp-telegram-sync","context":".","dockerfile":"connectors/telegram-sync/Dockerfile"},
          {"name":"whatsappmcp-instagram-connector","context":".","dockerfile":"connectors/instagram/Dockerfile"},
          {"name":"whatsappmcp-whatsapp-open-worker","context":".","dockerfile":"workers/whatsapp-open-worker/Dockerfile"},
          {"name":"whatsappmcp-mcp-server","context":".","dockerfile":"mcp-server/Dockerfile"}
        ]
    secrets: inherit
